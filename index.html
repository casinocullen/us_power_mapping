<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Power System Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Floating header -->
  <div id="header">
    <span class="header-icon">⚡</span>
    <div class="header-text">
      <h1>US Power System Map</h1>
      <p>ISO/RTO Regions · Transmission Lines · EIA 2023 Generation</p>
    </div>
  </div>

  <!-- Info panel (shown on region hover) -->
  <div id="info-panel" class="panel hidden">
    <div id="info-content">Hover over a state for details</div>
  </div>

  <!-- Scripts: CDN deps first, then app -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
